<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Beweble Admin Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background: radial-gradient(circle at top,#0f0f0f,#070707);
color:white;
padding:25px;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}

input{
width:300px;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
transition:.2s;
}

input:focus{
border-color:#6366f1;
box-shadow:0 0 10px rgba(99,102,241,0.3);
}

button{
position:relative;
overflow:hidden;
width:300px;
padding:15px 20px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);
color:#fff;
font-size:12px;
font-weight:700;
cursor:pointer;
}

button::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:50%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.45),
transparent
);
transform:skewX(-25deg);
transition:.7s;
}

button:hover::before{
left:170%;
}

/* ADMIN */
#admin{display:none;}

.header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: rgba(11, 11, 11, .75);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
    transition: .3s;
}

.header:hover {
    border-color: #6366f1;
    box-shadow: 0 15px 35px rgba(99, 102, 241, .2);
}



.logout{
width:auto;
padding:10px 18px;
background:#6366f1;
}

/* SEARCH */
.searchBox {
    width: 100%;
    max-width: 620px;
    margin: 18px 0;
    padding: 16px 20px;
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, .08);
    background: linear-gradient(145deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .03));
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: .3px;
    outline: none;
    transition: all .35s ease;
    box-shadow:
        0 10px 25px rgba(0, 0, 0, .18),
        inset 0 1px 0 rgba(255, 255, 255, .05);
}

.searchBox::placeholder {
    color: #8b8b97;
    transition: .3s;
}

.searchBox:hover {
    border-color: rgba(99, 102, 241, .45);
    transform: translateY(-2px);
    box-shadow:
        0 16px 35px rgba(99, 102, 241, .12),
        0 8px 18px rgba(0, 0, 0, .2);
}

.searchBox:focus {
    border-color: #6366f1;
    background: rgba(255, 255, 255, .07);
    transform: translateY(-3px) scale(1.01);
    box-shadow:
        0 0 0 4px rgba(99, 102, 241, .12),
        0 20px 45px rgba(99, 102, 241, .28);
}

.searchBox:focus::placeholder {
    opacity: .5;
    transform: translateX(6px);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

/* CARD */
.card {
    position: relative;
    overflow: hidden;

    padding: 18px;
    border-radius: 18px;

    background: rgba(20, 20, 30, .55);
    border: 1px solid rgba(255, 255, 255, .08);

    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);

    transition:
        transform .3s ease,
        box-shadow .3s ease,
        border-color .3s ease;

    animation: cardFade .45s ease;
}


.card::before {
    content: "";

    position: absolute;
    top: 0;
    left: -100%;

    width: 100%;
    height: 3px;

    background: linear-gradient(
        90deg,
        #6366f1,
        #a855f7
    );

    transition: left .45s ease;
}


.card:hover {
    transform: translateY(-8px) scale(1.02);

    border-color: #6366f1;

    box-shadow:
        0 20px 40px rgba(99, 102, 241, .28);
}


.card:hover::before {
    left: 0;
}


@keyframes cardFade {

    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }

}

/* INFO */
.info{
margin:6px 0;
font-size:14px;
color:#d1d5db;
}

.info b{color:white;}

/* SELECT */
select{
width:100%;
margin-top:10px;
cursor:pointer;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */
.smallBtn{
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.smallBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, .25);
}

.delete{background:#ef4444;}
.update{background:#6366f1;}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popupBox{
background:#111;
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:18px;
width:90%;
max-width:360px;
text-align:center;
}

.popupBtns{
display:flex;
gap:10px;
margin-top:15px;
}

.popupBtns button{
flex:1;
padding:12px;
border-radius:10px;
}

.cancel{background:#2a2a2a;}
.danger{background:#ef4444;}
.sidebar {
    position: fixed;

    top: 85px;
    left: 0;

    width: 100%;
    max-height: calc(100vh - 85px);

    padding: 22px;

    display: flex;
    flex-direction: column;
    gap: 12px;

    background: rgba(11, 11, 11, .96);

    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);

    border-bottom: 1px solid rgba(255,255,255,.08);

    border-radius: 0 0 24px 24px;

    box-shadow:
        0 20px 40px rgba(0,0,0,.45);

    overflow-y: auto;

    transform: translateY(-120%);

    transition:
        transform .4s cubic-bezier(.4,0,.2,1);

    z-index:10000;
}


.sidebar.open {
    transform: translateY(0);
}


.sidebar button {
    width:100%;

    display:flex;
    align-items:center;
    gap:12px;

    padding:14px 16px;

    border:none;
    border-radius:14px;

    background:rgba(255,255,255,.04);

    color:#fff;

    font-size:12px;
    font-weight:600;

    cursor:pointer;

    transition:.25s;
}


.sidebar button i {
    width:22px;

    font-size:16px;

    color:#6366f1;

    transition:.25s;
}


.sidebar button:hover {

    background:linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    transform:translateX(6px);

    box-shadow:
        0 10px 25px rgba(99,102,241,.35);
}


.sidebar button:hover i {
    color:#fff;
}


/* OVERLAY */

.overlay {
    position:fixed;

    inset:0;

    background:rgba(0,0,0,.55);

    -webkit-backdrop-filter:blur(3px);
    backdrop-filter:blur(3px);

    opacity:0;
    visibility:hidden;

    transition:.3s;

    z-index:9999;
}


.overlay.show {
    opacity:1;
    visibility:visible;
}


/* MENU BUTTON */

.menuBtn {

    width:auto;

    padding:10px 14px;

    border-radius:10px;

    background:#6366f1;

    border:none;

    color:white;

    cursor:pointer;

    transition:.3s;
}


.menuBtn:hover {

    transform:
        scale(1.08)
        rotate(90deg);

    box-shadow:
        0 10px 25px rgba(99,102,241,.35);
}

.pageHeader{
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
    padding-bottom:12px;
}

.pageHeader::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:140px;
    height:3px;
    border-radius:20px;
    background:linear-gradient(90deg,#6366f1,#8b5cf6,#06b6d4);
    background-size:200% 100%;
    animation:lineMove 3s linear infinite;
    box-shadow:0 0 12px #6366f1;
}

.pageHeader h2{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0;
    color:#fff;
    font-weight:800;
}

.pageHeader h2 i{
    color:#6366f1;
    animation:iconGlow 2s ease-in-out infinite,
              iconFloat 3s ease-in-out infinite;
}

@keyframes lineMove{
    to{
        background-position:200% 0;
    }
}

@keyframes iconGlow{
    0%,100%{
        filter:drop-shadow(0 0 5px #6366f1);
    }
    50%{
        filter:drop-shadow(0 0 15px #8b5cf6);
    }
}

@keyframes iconFloat{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-3px);
    }
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .6);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modalBox {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
}

.modalActions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
}

.modalActions button {
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}

#confirmDelete {
    background: #ef4444;
    color: white;
}

#cancelDelete {
    background: #475569;
    color: white;
}

/* Notifications */

.notifyLabel {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 15px;
    font-weight: 600;
    color: white;
}

.notifyTextarea {
    width: 100%;
    height: 170px;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, .08);
    background: rgba(255, 255, 255, .05);
    color: white;
    font-size: 15px;
    resize: vertical;
    outline: none;
    transition: .25s;
    font-family: 'Outfit', sans-serif;
}

.notifyTextarea:focus {
    border-color: #6366f1;
    box-shadow: 0 0 15px rgba(99, 102, 241, .35);
}

#sendNotificationBtn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    font-size: 16px;
    font-weight: 700;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: .25s;
}

#sendNotificationBtn:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 35px rgba(99, 102, 241, .35);
}

#sendNotificationBtn i {
    font-size: 18px;
}

.notifyTextarea::-webkit-scrollbar {
    width: 8px;
}

.notifyTextarea::-webkit-scrollbar-thumb {
    background: #6366f1;
    border-radius: 20px;
}

#login,
#admin {
    display: none;
}



#loader{
position:fixed;
inset:0;
background:radial-gradient(circle at top,#121212,#050505);
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
transition:.5s;
}

.loaderBox{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.loaderBox i{
font-size:60px;
color:#6366f1;
animation:pulse 1.2s infinite;
}

.loaderBox h2{
font-size:30px;
font-weight:700;
letter-spacing:1px;
}

.loaderBar{
width:220px;
height:6px;
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
}

.loaderBar span{
display:block;
height:100%;
width:40%;
background:linear-gradient(90deg,#6366f1,#a855f7);
border-radius:20px;
animation:loading 1.2s linear infinite;
}

@keyframes loading{
0%{transform:translateX(-120%);}
100%{transform:translateX(320%);}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}


.sidebar h3,
.sidebar h3 i {
    color: #6366f1;
}

.header i {
    color: #6366f1;
    margin-right: 8px;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(255, 255, 255, .05);
    border: 1px solid rgba(255, 255, 255, .08);
    backdrop-filter: blur(10px);
    font-weight: 600;
    transition: .3s ease;
}

.badge:hover {
    transform: translateY(-2px) scale(1.03);
    border-color: #6366f1;
    box-shadow: 0 10px 25px rgba(99, 102, 241, .25);
}

.badge span {
    color: #6366f1;
    font-weight: 700;
}
#requestsPage,
#usersPage,
#appealsPage,
#notificationsPage,
#refundsPage,
#agreementsPage{
animation:fadePage .35s ease;
}

@keyframes fadePage{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div id="loader" style="display:none;">
    <div class="loaderBox">
        <i class="fa-solid fa-bolt"></i>
        <h2>Beweble</h2>
        <div class="loaderBar">
            <span></span>
        </div>
    </div>
</div>

<!-- LOGIN -->
<div id="login">
    <h2><i class="fa fa-lock"></i> Admin Login</h2>
    
    <div class="inputBox">
   
        <input id="email" type="email" placeholder="Email">
    </div>
    
    <div class="inputBox">
      
        <input id="password" type="password" placeholder="Password">
    </div>
    
    <button id="loginBtn">
        <i class="fa fa-sign-in"></i> Login
    </button>
    
    <p id="msg"></p>
</div>

<!-- ADMIN -->
<div id="admin">
    <div id="sidebar" class="sidebar">
  <h3><i class="fa fa-bolt"></i> Dashboard Menu</h3>

<button onclick="showPage('requests');toggleMenu()">
    <i class="fa fa-envelope"></i> Requests
</button>

<button onclick="showPage('appeals');toggleMenu()">
    <i class="fa fa-file-text"></i> Appeals
</button>

<button onclick="showPage('users');toggleMenu()">
    <i class="fa fa-users"></i> Users
</button>

<button onclick="showPage('notifications');toggleMenu()">
    <i class="fa fa-bell"></i> Notifications
</button>
<button onclick="showPage('agreements');toggleMenu()">

</button>

</button>

<button onclick="logout()">

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <!-- NAV -->
    
    
    <!-- DASHBOARD HEADER -->
<div class="header">

<div>
    <span style="color:#6366f1;">
        <i class="fa-solid fa-bolt"></i>
    
    Admin Dashboard
    </span>
</div>
</div>


<div id="requestsPage">

<div class="pageHeader">
    <h2>
        <i class="fa-solid fa-envelope" style="color:#6366f1;"></i>
        Requests
    </h2>
    
    <div class="badge">
        Total Requests: <span id="count">0</span>
    </div>
</div>

  <input class="searchBox" id="searchInput"
  placeholder="Search requests by username or ID">

  <div class="grid" id="container"></div>

</div>

<div id="appealsPage" style="display:none;">

<div class="pageHeader">
  <h2>
    <i class="fa-solid fa-file-lines" style="color:#6366f1;"></i>

</h2>

        Total Appeals:
        <span id="appealsCount">0</span>
    </div>
</div>

<input
class="searchBox"
id="appealsSearchInput"
placeholder="Search appeal by username or email">

<div class="grid" id="appealsContainer"></div>

</div>

<div id="usersPage" style="display:none;">

<div class="pageHeader">
  <h2>
    <i class="fa-solid fa-users" style="color:#6366f1;"></i>
    Users
</h2>
    
    <div class="badge">
        Total Users: <span id="usersCount">0</span>
    </div>
</div>

  <input class="searchBox" id="usersSearchInput"
  placeholder="Search users by username, email or UID">

  <div class="grid" id="usersContainer"></div>

</div>
<div id="notificationsPage" style="display:none;">

<div class="pageHeader">
<h2>
    <i class="fa-solid fa-bell" style="color:#6366f1;"></i>
    Notifications Center
</h2>

    <div class="badge">
        <i class="fa-solid fa-paper-plane"></i>
        Send Notifications
    </div>
</div>

<div class="card" style="max-width:850px;margin:auto;">

    <div style="display:flex;flex-direction:column;gap:18px;">

        <div>

            <label class="notifyLabel">
                <i class="fa-solid fa-envelope"></i>
                Recipient Email
            </label>

            <input
            id="notifyEmail"
            class="searchBox"
            style="margin:0;width:100%;"

        </div>

        <div>

            <label class="notifyLabel">
                <i class="fa-solid fa-heading"></i>
                Notification Title
            </label>

            <input
            id="notifyTitle"
            class="searchBox"
            style="margin:0;width:100%;"
            placeholder="Example: Request Updated">

        </div>

<div>

    <label class="notifyLabel">
        <i class="fa-solid fa-link"></i>
        Link (optional)
    </label>

    <input
    id="notifyLink"
    class="searchBox"
    style="margin:0;width:100%;"

</div>
        <div>

            <label class="notifyLabel">
                <i class="fa-solid fa-message"></i>

            </label>

            id="notifyMessage"
            class="notifyTextarea"

</button>

<button id="deleteAllNotificationsBtn"
style="
margin-top:12px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
">
    <i class="fa-solid fa-trash"></i>
    Delete All Notifications
</button>

    </div>

</div>

<br>

<div class="grid" id="notificationsAdminContainer"></div>

</div>

<div id="refundsPage" style="display:none;">

<div class="pageHeader">
<h2>
    <i class="fa-solid fa-rotate-left" style="color:#6366f1;"></i>
    Refunds
</h2>

    <div class="badge">
        Total Refunds:
        <span id="refundsCount">0</span>
    </div>
</div>

<input
class="searchBox"
id="refundsSearchInput"
placeholder="Search by email or Request ID">

<div class="grid" id="refundsContainer"></div>

</div>



<!-- الصق هنا -->
<div id="agreementsPage" style="display:none;">

<div class="pageHeader">
   <h2>
    <i class="fa-solid fa-file-signature" style="color:#6366f1;"></i>
    Agreements
</h2>

    <div style="display:flex;align-items:center;gap:12px;">

        <div class="badge">
            Total Agreements:
            <span id="agreementsCount">0</span>
        </div>

        <button id="deleteAllAgreementsBtn"
        style="
        margin:0;
        width:auto;
        padding:10px 14px;
        border:none;
        border-radius:12px;
        background:linear-gradient(135deg,#ef4444,#dc2626);
        color:white;
        font-size:14px;
        font-weight:700;
        cursor:pointer;
        display:flex;
        justify-content:center;
        align-items:center;
        gap:8px;
        ">
            <i class="fa-solid fa-trash"></i>
            Delete All
        </button>

    </div>
</div>

<input
class="searchBox"
id="agreementsSearchInput"
placeholder="Search by username or email">



<div class="grid" id="agreementsContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupBox">
<h3>Confirm Delete</h3>
<p>Are you sure you want to delete this request?</p>

<div class="popupBtns">
<button class="cancel" onclick="closePopup()">Cancel</button>
<button class="danger" id="confirmDelete">Delete</button>
</div>
</div>
</div>
</div> <!-- end admin -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    query,
    where,
    doc,
    updateDoc,
    deleteDoc,
    getDoc,
    orderBy,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getAuth, signInWithEmailAndPassword,
onAuthStateChanged, signOut

/* SEND NOTIFICATION */
sendNotificationBtn.onclick = async () => {
    
    const title = notifyTitle.value.trim();
    const message = notifyMessage.value.trim();
    const email = notifyEmail.value.trim().toLowerCase();
    
    if (!title || !message) {
        alert("Enter title and message.");
        return;
    }
    
    // إرسال لجميع المستخدمين
    if (email === "") {
        
        const usersSnap = await getDocs(collection(db, "users"));
        
        for (const userDoc of usersSnap.docs) {
            
            const user = userDoc.data();
            
            await addDoc(collection(db, "notifications"), {
                uid: user.uid,
                email: (user.email || "").toLowerCase(),
                title,
                message,
                link: notifyLink.value.trim(),
                time: Date.now(),
                read: false
            });
            
        }
        
        alert("Notification sent to all users.");
        
    } else {
        
        // إرسال لمستخدم واحد
        const q = query(
            collection(db, "users"),
            where("email", "==", email)
        );
        
        const snap = await getDocs(q);
        
        if (snap.empty) {
            alert("User not found.");
            return;
        }
        
        const user = snap.docs[0].data();
        
        await addDoc(collection(db, "notifications"), {
            uid: user.uid,
            email,
            title,
            message,
            link: notifyLink.value.trim(),
            time: Date.now(),
            read: false
        });
        
        alert("Notification sent.");
        
    }
    
    notifyEmail.value = "";
    notifyTitle.value = "";
    notifyMessage.value = "";
    
};
