<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beweble Admin Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background: radial-gradient(circle at top,#0f0f0f,#070707);
color:white;
padding:25px;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}

input{
width:300px;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
transition:.2s;
}

input:focus{
border-color:#6366f1;
box-shadow:0 0 10px rgba(99,102,241,0.3);
}

button{
width:300px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6366f1,#a855f7);
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{transform:scale(1.03);}

/* ADMIN */
#admin{display:none;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.badge{
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.logout{
width:auto;
padding:10px 18px;
background:#f97316;
}

/* SEARCH */
.searchBox{
width:100%;
max-width:600px;
margin:15px 0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
backdrop-filter:blur(10px);
transition:.25s;
}

.card:hover{
transform:translateY(-6px);
}

/* INFO */
.info{
margin:6px 0;
font-size:14px;
color:#cfcfcf;
}

.info b{color:white;}

/* SELECT */
select{
width:100%;
margin-top:10px;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */
.smallBtn{
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.delete{background:#ef4444;}
.update{background:#3b82f6;}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popupBox{
background:#111;
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:18px;
width:90%;
max-width:360px;
text-align:center;
}

.popupBtns{
display:flex;
gap:10px;
margin-top:15px;
}

.popupBtns button{
flex:1;
padding:12px;
border-radius:10px;
}

.cancel{background:#2a2a2a;}
.danger{background:#ef4444;}
.info span {
    font-size: 13px;
    font-weight: 600;
    display: inline-block;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🔥 Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<p id="msg"></p>
</div>

<!-- ADMIN -->
<div id="admin">

<div class="header">
<div>⚡ Admin Dashboard</div>
<div class="badge">Total: <span id="count">0</span></div>
<button class="logout" onclick="logout()">Logout</button>
</div>

<input class="searchBox" id="searchInput" placeholder="Search by username or ID">

<div class="grid" id="container"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupBox">
<h3>Confirm Delete</h3>
<p>Are you sure you want to delete this request?</p>

<div class="popupBtns">
<button class="cancel" onclick="closePopup()">Cancel</button>
<button class="danger" id="confirmDelete">Delete</button>
</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, doc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword,
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCjmJBV_GKL4MLYQGr3DWOOAWwK4V8AHtU",
authDomain: "beweble.firebaseapp.com",
projectId: "beweble",
storageBucket: "beweble.firebasestorage.app",
messagingSenderId: "184003889465",
appId: "1:184003889465:web:6426d12aca892d95c600e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.getElementById("container");
const count = document.getElementById("count");
const popup = document.getElementById("popup");
const confirmDelete = document.getElementById("confirmDelete");
const searchInput = document.getElementById("searchInput");

let all = [];
let deleteId = null;

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
await signInWithEmailAndPassword(auth,email.value,password.value);
login.style.display="none";
admin.style.display="block";
load();
};

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user){
login.style.display="none";
admin.style.display="block";
load();
}
});

/* LOGOUT */
window.logout = async () => {
await signOut(auth);
location.reload();
};

/* LOAD */
async function load(){
container.innerHTML="";
const snap = await getDocs(collection(db,"requests"));

all = [];

snap.forEach(d=>{
all.push({id:d.id,...d.data()});
});

count.innerText = all.length;
render(all);
}

/* RENDER */
function render(data){
container.innerHTML="";

data.forEach(r=>{

const card = document.createElement("div");
card.className="card";

card.innerHTML = `
<h3>🆔 ${r.requestId || r.id}</h3>

<div class="info"><b>User:</b> ${r.username || "-"}</div>
<div class="info"><b>Email:</b> ${r.newemail || "-"}</div>
<div class="info"><b>Phone:</b> ${r.phone || "-"}</div>

<div class="info"><b>Platform:</b> 
<span style="
padding:4px 10px;
border-radius:999px;
background:#1f1f1f;
border:1px solid #333;
">
${r.platform || "Unknown"}
</span>
</div>

<div class="info"><b>Issue:</b> 
<span style="
padding:4px 10px;
border-radius:999px;
background:${
  r.problemType === "Hacked" ? "#ff3b3b33" :
  r.problemType === "Disabled" ? "#ffb02033" :
  r.problemType === "Suspended" ? "#5865f233" :
  "#1f1f1f"
};
border:1px solid #333;
">
${r.problemType || "Not set"}
</span>
</div>

<div class="info"><b>Status:</b> ${r.status || "Pending"}</div>
`;

const select = card.querySelector("select");
select.value = r.status || "Pending";

/* UPDATE */
card.querySelector(".update").onclick = async () => {
await updateDoc(doc(db,"requests",r.id),{
status: select.value
});
load();
};

/* DELETE POPUP */
card.querySelector(".delete").onclick = () => {
deleteId = r.id;
popup.style.display="flex";
};

container.appendChild(card);
});
}

/* CONFIRM DELETE */
confirmDelete.onclick = async () => {
await deleteDoc(doc(db,"requests",deleteId));
deleteId = null;
popup.style.display="none";
load();
};

window.closePopup = () => {
popup.style.display="none";
deleteId=null;
};

/* SEARCH */
searchInput.addEventListener("input",e=>{
const q = e.target.value.toLowerCase();

render(all.filter(r =>
(r.username||"").toLowerCase().includes(q) ||
(r.requestId||"").toLowerCase().includes(q)
));
});

</script>

</body>
</html>
