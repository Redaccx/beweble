<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Beweble Admin Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background: radial-gradient(circle at top,#0f0f0f,#070707);
color:white;
padding:25px;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}

input{
width:300px;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
transition:.2s;
}

input:focus{
border-color:#6366f1;
box-shadow:0 0 10px rgba(99,102,241,0.3);
}

button{
width:300px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6366f1,#a855f7);
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;

}

button:hover{transform:scale(1.03);}

/* ADMIN */
#admin{display:none;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.badge{
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.logout{
width:auto;
padding:10px 18px;
background:#6366f1;
}

/* SEARCH */
.searchBox{
width:100%;
max-width:600px;
margin:15px 0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
backdrop-filter:blur(10px);
transition:.25s;
}

.card:hover{
    color:#6366f1;
transform:translateY(-6px);
border-color:#6366f1;
box-shadow:0 0 10px rgba(99, 102, 241, 0.3);
}

/* INFO */
.info{
margin:6px 0;
font-size:14px;
color:#cfcfcf;
}

.info b{color:white;}

/* SELECT */
select{
width:100%;
margin-top:10px;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */
.smallBtn{
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.delete{background:#ef4444;}
.update{background:#6366f1;}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popupBox{
background:#111;
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:18px;
width:90%;
max-width:360px;
text-align:center;
}

.popupBtns{
display:flex;
gap:10px;
margin-top:15px;
}

.popupBtns button{
flex:1;
padding:12px;
border-radius:10px;
}

.cancel{background:#2a2a2a;}
.danger{background:#ef4444;}
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0b0b0b;
border-right:1px solid rgba(255,255,255,0.08);
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
transition:.3s;
z-index:10000;
}

.sidebar.open{left:0;}

.sidebar button{
width:100%;
text-align:left;
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:10px;
border:none;
color:white;
cursor:pointer;
}
.sidebar button i {
    margin-right: 8px;
}
.sidebar button:hover{background:#6366f1;}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:9999;
}

.overlay.show{display:block;}

.menuBtn{
width:auto;
padding:10px 14px;
border-radius:10px;
background:#6366f1;
border:none;
color:white;
cursor:pointer;
}

.pageHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .6);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modalBox {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
}

.modalActions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
}

.modalActions button {
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}

#confirmDelete {
    background: #ef4444;
    color: white;
}

#cancelDelete {
    background: #475569;
    color: white;
}

/* Notifications */

.notifyLabel {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 15px;
    font-weight: 600;
    color: white;
}

.notifyTextarea {
    width: 100%;
    height: 170px;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, .08);
    background: rgba(255, 255, 255, .05);
    color: white;
    font-size: 15px;
    resize: vertical;
    outline: none;
    transition: .25s;
    font-family: 'Outfit', sans-serif;
}

.notifyTextarea:focus {
    border-color: #6366f1;
    box-shadow: 0 0 15px rgba(99, 102, 241, .35);
}

#sendNotificationBtn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    font-size: 16px;
    font-weight: 700;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: .25s;
}

#sendNotificationBtn:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 35px rgba(99, 102, 241, .35);
}

#sendNotificationBtn i {
    font-size: 18px;
}

.notifyTextarea::-webkit-scrollbar {
    width: 8px;
}

.notifyTextarea::-webkit-scrollbar-thumb {
    background: #6366f1;
    border-radius: 20px;
}
</style>
</head>

<body>



<!-- LOGIN -->
<div id="login">
<h2>🔥 Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<p id="msg"></p>
</div>

<!-- ADMIN -->
<div id="admin">
    <div id="sidebar" class="sidebar">
  <h3><i class="fa fa-bolt"></i> Dashboard Menu</h3>

<button onclick="showPage('requests');toggleMenu()">
    <i class="fa fa-envelope"></i> Requests
</button>

<button onclick="showPage('appeals');toggleMenu()">
    <i class="fa fa-file-text"></i> Appeals
</button>

<button onclick="showPage('users');toggleMenu()">
    <i class="fa fa-users"></i> Users
</button>

<button onclick="showPage('notifications');toggleMenu()">
    <i class="fa fa-bell"></i> Notifications
</button>
<button onclick="showPage('agreements');toggleMenu()">
    <i class="fa-solid fa-file-signature"></i> Agreements
</button>

<button onclick="logout()">
    <i class="fa fa-sign-out"></i> Logout
</button>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <!-- NAV -->
    
    
    <!-- DASHBOARD HEADER -->
<div class="header">
    <button class="menuBtn" onclick="toggleMenu()">☰</button>
    
    
<div>⚡ Admin Dashboard</div>
</div>


<div id="requestsPage">

<div class="pageHeader">
    <h2>📨 Requests</h2>
    
    <div class="badge">
        Total Requests: <span id="count">0</span>
    </div>
</div>

  <input class="searchBox" id="searchInput"
  placeholder="Search requests by username or ID">

  <div class="grid" id="container"></div>

</div>

<div id="appealsPage" style="display:none;">

<div class="pageHeader">
    <h2>📄 Appeals</h2>

    <div class="badge">
        Total Appeals:
        <span id="appealsCount">0</span>
    </div>
</div>

<input
class="searchBox"
id="appealsSearchInput"
placeholder="Search appeal by username or email">

<div class="grid" id="appealsContainer"></div>

</div>

<div id="usersPage" style="display:none;">

<div class="pageHeader">
    <h2>👥 Users</h2>
    
    <div class="badge">
        Total Users: <span id="usersCount">0</span>
    </div>
</div>

  <input class="searchBox" id="usersSearchInput"
  placeholder="Search users by username, email or UID">

  <div class="grid" id="usersContainer"></div>

</div>
<div id="notificationsPage" style="display:none;">

<div class="pageHeader">
    <h2>
        <i class="fa-solid fa-bell"></i>
        Notifications Center
    </h2>

    <div class="badge">
        <i class="fa-solid fa-paper-plane"></i>
        Send Notifications
    </div>
</div>

<div class="card" style="max-width:850px;margin:auto;">

    <div style="display:flex;flex-direction:column;gap:18px;">

        <div>

            <label class="notifyLabel">
                <i class="fa-solid fa-envelope"></i>
                Recipient Email
            </label>

            <input
            id="notifyEmail"
            class="searchBox"
            style="margin:0;width:100%;"
            placeholder="Leave empty to send notification to all users">

        </div>

        <div>

            <label class="notifyLabel">
                <i class="fa-solid fa-heading"></i>
                Notification Title
            </label>

            <input
            id="notifyTitle"
            class="searchBox"
            style="margin:0;width:100%;"
            placeholder="Example: Request Updated">

        </div>

<div>

    <label class="notifyLabel">
        <i class="fa-solid fa-link"></i>
        Link (optional)
    </label>

    <input
    id="notifyLink"
    class="searchBox"
    style="margin:0;width:100%;"
    placeholder="https://example.com">

</div>
        <div>

            <label class="notifyLabel">
                <i class="fa-solid fa-message"></i>
                Notification Message
            </label>

            <textarea
            id="notifyMessage"
            class="notifyTextarea"
            placeholder="Write your notification here..."></textarea>

        </div>

    <button id="sendNotificationBtn">
    <i class="fa-solid fa-paper-plane"></i>
    Send Notification
</button>

<button id="deleteAllNotificationsBtn"
style="
margin-top:12px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
">
    <i class="fa-solid fa-trash"></i>
    Delete All Notifications
</button>

    </div>

</div>

<br>

<div class="grid" id="notificationsAdminContainer"></div>

</div>


</div> <!-- end admin -->

<!-- الصق هنا -->
<div id="agreementsPage" style="display:none;">

<div class="pageHeader">
    <h2>📜 Agreements</h2>

    <div class="badge">
        Total Agreements:
        <span id="agreementsCount">0</span>
    </div>
</div>
<button id="deleteAllAgreementsBtn"
style="
margin-top:12px;
width:220px;
padding:10px 14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
font-size:14px;
font-weight:700;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
">
    <i class="fa-solid fa-trash"></i>
    Delete All Agreements
</button>
<input
class="searchBox"
id="agreementsSearchInput"
placeholder="Search by username or email">



<div class="grid" id="agreementsContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupBox">
<h3>Confirm Delete</h3>
<p>Are you sure you want to delete this request?</p>

<div class="popupBtns">
<button class="cancel" onclick="closePopup()">Cancel</button>
<button class="danger" id="confirmDelete">Delete</button>
</div>
</div>
</div>
