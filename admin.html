<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Beweble Admin Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background: radial-gradient(circle at top,#0f0f0f,#070707);
color:white;
padding:25px;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}

input{
width:300px;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
transition:.2s;
}

input:focus{
border-color:#6366f1;
box-shadow:0 0 10px rgba(99,102,241,0.3);
}

button{
width:300px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6366f1,#a855f7);
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{transform:scale(1.03);}

/* ADMIN */
#admin{display:none;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.badge{
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.logout{
width:auto;
padding:10px 18px;
background:#6366f1;
}

/* SEARCH */
.searchBox{
width:100%;
max-width:600px;
margin:15px 0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
backdrop-filter:blur(10px);
transition:.25s;
}

.card:hover{
    color:#6366f1;
transform:translateY(-6px);
border-color:#6366f1;
box-shadow:0 0 10px rgba(99, 102, 241, 0.3);
}

/* INFO */
.info{
margin:6px 0;
font-size:14px;
color:#cfcfcf;
}

.info b{color:white;}

/* SELECT */
select{
width:100%;
margin-top:10px;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */
.smallBtn{
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.delete{background:#ef4444;}
.update{background:#6366f1;}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popupBox{
background:#111;
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:18px;
width:90%;
max-width:360px;
text-align:center;
}

.popupBtns{
display:flex;
gap:10px;
margin-top:15px;
}

.popupBtns button{
flex:1;
padding:12px;
border-radius:10px;
}

.cancel{background:#2a2a2a;}
.danger{background:#ef4444;}
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0b0b0b;
border-right:1px solid rgba(255,255,255,0.08);
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
transition:.3s;
z-index:10000;
}

.sidebar.open{left:0;}

.sidebar button{
width:100%;
text-align:left;
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:10px;
border:none;
color:white;
cursor:pointer;
}

.sidebar button:hover{background:#6366f1;}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:9999;
}

.overlay.show{display:block;}

.menuBtn{
width:auto;
padding:10px 14px;
border-radius:10px;
background:#6366f1;
border:none;
color:white;
cursor:pointer;
}

.pageHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .6);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modalBox {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
}

.modalActions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
}

.modalActions button {
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}

#confirmDelete {
    background: #ef4444;
    color: white;
}

#cancelDelete {
    background: #475569;
    color: white;
}
</style>
</head>

<body>



<!-- LOGIN -->
<div id="login">
<h2>🔥 Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<p id="msg"></p>
</div>

<!-- ADMIN -->
<div id="admin">
    <div id="sidebar" class="sidebar">
    <h3>⚡ Menu</h3>
    
  <button onclick="showPage('requests');toggleMenu()">📨 Requests</button>

<button onclick="showPage('appeals');toggleMenu()">📄 Appeals</button>

<button onclick="showPage('users');toggleMenu()">👥 Users</button>

<button onclick="logout()">🚪 Logout</button>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <!-- NAV -->
    
    
    <!-- DASHBOARD HEADER -->
<div class="header">
    <button class="menuBtn" onclick="toggleMenu()">☰</button>
    
    
<div>⚡ Admin Dashboard</div>
</div>


<div id="requestsPage">

<div class="pageHeader">
    <h2>📨 Requests</h2>
    
    <div class="badge">
        Total Requests: <span id="count">0</span>
    </div>
</div>

  <input class="searchBox" id="searchInput"
  placeholder="Search requests by username or ID">

  <div class="grid" id="container"></div>

</div>

<div id="appealsPage" style="display:none;">

<div class="pageHeader">
    <h2>📄 Appeals</h2>

    <div class="badge">
        Total Appeals:
        <span id="appealsCount">0</span>
    </div>
</div>

<input
class="searchBox"
id="appealsSearchInput"
placeholder="Search appeal by username or email">

<div class="grid" id="appealsContainer"></div>

</div>

<div id="usersPage" style="display:none;">

<div class="pageHeader">
    <h2>👥 Users</h2>
    
    <div class="badge">
        Total Users: <span id="usersCount">0</span>
    </div>
</div>

  <input class="searchBox" id="usersSearchInput"
  placeholder="Search users by username, email or UID">

  <div class="grid" id="usersContainer"></div>

</div>

</div> <!-- end admin -->


<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupBox">
<h3>Confirm Delete</h3>
<p>Are you sure you want to delete this request?</p>

<div class="popupBtns">
<button class="cancel" onclick="closePopup()">Cancel</button>
<button class="danger" id="confirmDelete">Delete</button>
</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword,
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCjmJBV_GKL4MLYQGr3DWOOAWwK4V8AHtU",
authDomain: "beweble.firebaseapp.com",
projectId: "beweble",
storageBucket: "beweble.firebasestorage.app",
messagingSenderId: "184003889465",
appId: "1:184003889465:web:6426d12aca892d95c600e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.getElementById("container");
const usersContainer =
    document.getElementById("usersContainer");
const count = document.getElementById("count");
const popup = document.getElementById("popup");
const confirmDelete = document.getElementById("confirmDelete");
const searchInput = document.getElementById("searchInput");
const usersSearchInput =
    document.getElementById(
        "usersSearchInput"
    );
    const usersCount = document.getElementById("usersCount");
    const appealsContainer = document.getElementById("appealsContainer");
const appealsSearchInput = document.getElementById("appealsSearchInput");
const appealsCount = document.getElementById("appealsCount");

let allAppeals = [];
let allUsers = [];
let all = [];
let deleteId = null;
let deleteCollection = null;

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
await signInWithEmailAndPassword(auth,email.value,password.value);
login.style.display="none";
admin.style.display="block";
load();
};

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user){
login.style.display="none";
admin.style.display="block";
load();
}
});

/* LOGOUT */
window.logout = async () => {
await signOut(auth);
location.reload();
};

/* LOAD */
async function load(){
container.innerHTML="";
const snap = await getDocs(collection(db,"requests"));

all = [];

snap.forEach(d=>{
all.push({id:d.id,...d.data()});
});

count.innerText = all.length;
render(all);
loadUsers();
loadAppeals();

}

/* RENDER */
function render(data){
container.innerHTML="";

data.forEach(r=>{

const card = document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>🆔 ${r.requestId || r.id}</h3>

<div class="info"><b>User:</b> ${r.username || "-"}</div>

<div class="info"><b>Email:</b> ${r.newemail || "-"}</div>

<div class="info"><b>Phone:</b> ${r.phone || "-"}</div>

<div class="info"><b>Platform:</b> ${r.platform || "-"}</div>

<div class="info"><b>Problem Type:</b> ${r.problemType || "-"}</div>

<div class="info">
    <b>Description:</b> ${r.details || "-"}
</div>

<div class="info">
    <b>Sent:</b>
    ${r.createdAt ? new Date(r.createdAt).toLocaleString() : "-"}
</div>

<div class="info"><b>Status:</b> ${r.status || "Pending"}</div>

<select>
<option>Pending</option>
<option>Waiting Payment</option>
<option>In Progress</option>
<option>In Review</option>
<option>Need Some Details Contact support</option>
<option>Rejected</option>
<option>Problem Solved</option>
<option>Recoverd</option>
<option>Completed</option>
</select>

<button class="smallBtn update">Update</button>
<button class="smallBtn delete">Delete</button>

`;

const select = card.querySelector("select");
select.value = r.status || "Pending";


/* UPDATE */
confirmDelete.onclick = async () => {
    
    await deleteDoc(doc(db, deleteCollection, deleteId));
    
    popup.style.display = "none";
    
    deleteId = null;
    deleteCollection = null;
    
    load();
    loadAppeals();
    
};
card.querySelector(".delete").onclick = () => {
    deleteId = r.id;
deleteCollection = "requests";
popup.style.display = "flex";
};
/* DELETE POPUP */


container.appendChild(card);
});
}

/* LOAD USERS */
async function loadUsers() {
    
    usersContainer.innerHTML = "";
    
    const snap = await getDocs(collection(db, "users"));
    const usersCount = document.getElementById("usersCount");

if (usersCount) {
    usersCount.innerText = snap.size;
}
    snap.forEach(userDoc => {
        
        const ref = doc(db, "users", userDoc.id);
const userData = userDoc.data();
        
        const user = userDoc.data();
        const disabled = user.disabled === true;const createdDate = user.createdAt ?
    new Date(user.createdAt).toLocaleString() :
    "-";
        
        const card = document.createElement("div");
        card.className = "card";
        
        card.innerHTML = `
            <h3>👤 ${user.username || "Unknown"}</h3>

            <div class="info">
                ${user.email || "-"}
            </div>

            <div class="info">
                ID: ${user.uid || userDoc.id}
            </div>
            <div class="info">
    Created: ${createdDate}
</div>

            <div class="info">
                Status:
                <b style="color:${disabled ? "#ef4444" : "#22c55e"}">
                    ${disabled ? "Disabled" : "Active"}
                </b>
            </div>
<div class="info">
    Account Status:
    <b style="color:${
        user.accountHealth === "Restricted"
        ? "#ef4444"
        : user.accountHealth === "Warning"
        ? "#facc15"
        : "#22c55e"
    }">
        ${user.accountHealth || "Good"}
    </b>
</div>
            ${
                disabled ? `
                    <div class="info">
                        Disabled: ${user.disabledDate || "-"}
                    </div>
                ` : ""
            }

            <button class="smallBtn"
                style="background:${disabled ? "#22c55e" : "#ef4444"}">
                ${disabled ? "Enable" : "Disable"}
            </button>
            <button class="smallBtn statusBtn" style="background:#6366f1; margin-top:8px;">
    Change Account Status
</button>
            
        
        `;
        card.querySelector(".statusBtn").onclick = async () => {
    
    let current = userData.accountHealth || "Good";
    let next;
    
    if (current === "Good") next = "Warning";
    else if (current === "Warning") next = "Restricted";
    else next = "Good";
    
    await updateDoc(ref, {
        accountHealth: next
    });
    
    loadUsers();
};
        
        card.querySelector(".smallBtn").onclick = async () => {
            
            try {
                
                const ref = doc(db, "users", userDoc.id);
                
                if (disabled) {
                    
                    await updateDoc(ref, {
    
    disabled: false,
    
    disabledDate: "",
    
    disabledReason: "",
    
    showWelcomeBack: true
    
});
                    
                } else {
                    
                    await updateDoc(ref, {
                        disabled: true,
                        disabledDate: new Date().toLocaleDateString("en-US", {
                            year: "numeric",
                            month: "long",
                            day: "numeric"
                        }),
                        disabledReason: "Violation of Beweble Agency Policies"
                    });
                }
                
                loadUsers();
                
            } catch (err) {
                console.log(err);
                alert("Failed ❌");
            }
        };
    
        
        usersContainer.appendChild(card);
    });
}

async function loadAppeals() {
    
    appealsContainer.innerHTML = "";
    
    const snap = await getDocs(collection(db, "appeals"));
    
    allAppeals = [];
    
    snap.forEach(docSnap => {
        allAppeals.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });
    
    appealsCount.innerText = allAppeals.length;
    
    renderAppeals(allAppeals);
}

function renderAppeals(data) {
    
    appealsContainer.innerHTML = "";
    
    data.forEach(a => {
        
        const card = document.createElement("div");
        card.className = "card";
        
        card.innerHTML = `

<h3>📄 Appeal</h3>

<div class="info"><b>Username:</b> ${a.username || "-"}</div>

<div class="info"><b>Full Name:</b> ${a.fullname || "-"}</div>

<div class="info"><b>Email:</b> ${a.email || "-"}</div>

<div class="info"><b>Phone:</b> ${a.phone || "-"}</div>

<div class="info"><b>Date of Birth:</b> ${a.birth || "-"}</div>

<div class="info"><b>Reason:</b><br>${a.reason || "-"}</div>

<div class="info"><b>Status:</b> ${a.status || "Pending"}</div>

<select>
<option>Pending</option>
<option>In Review</option>
<option>Need More Details contact support</option>
<option>Reviewed</option>
<option>Rejected</option>
</select>

<button class="smallBtn update">
Update Status
</button>

<button class="smallBtn delete">
Delete Appeal
</button>

`;
        
        const select = card.querySelector("select");
        select.value = a.status || "Pending";
        
        card.querySelector(".update").onclick = async () => {
            
            await updateDoc(
                doc(db, "appeals", a.id),
                {
                    status: select.value
                }
            );
            
            loadAppeals();
        };
        
        card.querySelector(".delete").onclick = () => {
    
    deleteId = a.id;
    deleteCollection = "appeals";
    popup.style.display = "flex";
    
};
        
        appealsContainer.appendChild(card);
        
    });
    
}
/* CONFIRM DELETE */
confirmDelete.onclick = async () => {
await deleteDoc(doc(db,"requests",deleteId));
deleteId = null;
popup.style.display="none";
load();
};

window.closePopup = () => {
popup.style.display="none";
deleteId=null;
};

/* SEARCH */
searchInput.addEventListener("input",e=>{
const q = e.target.value.toLowerCase();

render(all.filter(r =>
(r.username||"").toLowerCase().includes(q) ||
(r.requestId||"").toLowerCase().includes(q)
));
});
window.showPage = (page) => {
    
    document.getElementById("requestsPage").style.display = "none";
    document.getElementById("usersPage").style.display = "none";
    document.getElementById("appealsPage").style.display = "none";
    
    if (page === "requests") {
        document.getElementById("requestsPage").style.display = "block";
    }
    
    if (page === "users") {
        document.getElementById("usersPage").style.display = "block";
        loadUsers();
    }
    
    if (page === "appeals") {
        document.getElementById("appealsPage").style.display = "block";
        loadAppeals();
    }
    
};

usersSearchInput.addEventListener("input", e => {
    
    const q = e.target.value.toLowerCase();
    
    const cards = usersContainer.querySelectorAll(".card");
    
    cards.forEach(card => {
        
        const text = card.innerText.toLowerCase();
        
        if (text.includes(q)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
    
});
window.toggleMenu = () => {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
};
</script>

</body>
</html>
