<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قريباً | الذكاء الاصطناعي</title>
<style>
:root {
  --bg: #121212;
  --gold: #ffd36a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: var(--bg);
  color: var(--gold);
  font-family: "Cairo", sans-serif;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* خلفية متحركة */
.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,211,106,0.15), transparent 50%),
              radial-gradient(circle at 70% 70%, rgba(255,211,106,0.1), transparent 60%);
  filter: blur(70px);
  animation: bgMove 8s infinite alternate ease-in-out;
  z-index: 0;
}
@keyframes bgMove {
  0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
  100% { transform: scale(1.2) rotate(10deg); opacity: 1; }
}

/* الدوائر */
.circle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,211,106,0.3), transparent 70%);
  animation: move 10s linear infinite;
  mix-blend-mode: screen;
}
.circle:nth-child(1) { width: 200px; height: 200px; top: 15%; left: 10%; animation-delay: 0s; }
.circle:nth-child(2) { width: 160px; height: 160px; bottom: 20%; right: 15%; animation-delay: 3s; }
.circle:nth-child(3) { width: 260px; height: 260px; bottom: 30%; left: 45%; animation-delay: 6s; }

@keyframes move {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  50% { transform: translateY(-30px) scale(1.1); opacity: 0.9; }
  100% { transform: translateY(0) scale(1); opacity: 0.6; }
}

/* الضوء مع الماوس */
.light {
  position: fixed;
  width: 200px;
  height: 200px;
  pointer-events: none;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,211,106,0.2), transparent 80%);
  filter: blur(70px);
  z-index: 1;
  transition: transform 0.08s linear;
}

/* المحتوى */
.container {
  position: relative;
  z-index: 3;
}

.logo {
  width: 150px;
  height: 150px;
  margin-bottom: 25px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(255,211,106,0.4));
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 2.4rem;
  letter-spacing: 2px;
  margin-bottom: 10px;
  animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 5px var(--gold); }
  to { text-shadow: 0 0 25px var(--gold), 0 0 40px var(--gold); }
}

p {
  font-size: 1.1rem;
  opacity: 0.85;
  margin-bottom: 20px;
}

/* العداد */
.countdown {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 10px;
  font-weight: bold;
}
.countdown div {
  background: rgba(255,211,106,0.05);
  border: 1px solid rgba(255,211,106,0.2);
  border-radius: 12px;
  padding: 15px 20px;
  box-shadow: 0 0 10px rgba(255,211,106,0.2);
  min-width: 80px;
}
.countdown span {
  display: block;
  font-size: 2rem;
  margin-bottom: 6px;
}
.label {
  font-size: 0.9rem;
  opacity: 0.8;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="light" id="light"></div>

<div class="container">
  <img src="https://l.top4top.io/p_3573pclji1.png" alt="Logo" class="logo">
  <h1>قريباً جداً</h1>
  <p>موقع الذكاء الاصطناعي المتطور قيد الإطلاق — ترقّبوا التجربة الجديدة بعد شهرين.</p>

  <div class="countdown" id="countdown">
    <div><span id="days">--</span><div class="label">يوم</div></div>
    <div><span id="hours">--</span><div class="label">ساعة</div></div>
    <div><span id="minutes">--</span><div class="label">دقيقة</div></div>
    <div><span id="seconds">--</span><div class="label">ثانية</div></div>
  </div>
</div>

<script>
// حركة الضوء مع الماوس
const light = document.getElementById("light");
document.addEventListener("mousemove", (e) => {
  light.style.transform = `translate(${e.clientX - 100}px, ${e.clientY - 100}px)`;
});

// العد التنازلي لشهرين من اليوم
const now = new Date();
const launchDate = new Date(now.getFullYear(), now.getMonth() + 2, now.getDate());

function updateCountdown() {
  const current = new Date().getTime();
  const distance = launchDate.getTime() - current;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
