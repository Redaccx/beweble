<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الذكاء الاصطناعي</title>
<style>
:root {
  --bg: #121212;
  --pink: #fd136a;
  --gold: #ffd36a;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--pink);
  font-family: "Cairo", sans-serif;
  overflow: hidden;
}

/* خلفية متحركة (ذكاء اصطناعي) */
#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: radial-gradient(circle at 30% 30%, rgba(253,19,106,0.15), transparent 40%),
              radial-gradient(circle at 70% 70%, rgba(255,211,106,0.15), transparent 40%);
  animation: moveBg 8s infinite alternate ease-in-out;
}

@keyframes moveBg {
  0% { background-position: 30% 30%, 70% 70%; }
  100% { background-position: 50% 50%, 50% 50%; }
}

/* المحتوى */
.container {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

.logo {
  width: 140px;
  height: 140px;
  margin-bottom: 30px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

h1 {
  font-size: 2.4rem;
  color: var(--pink);
  text-shadow: 0 0 20px rgba(253,19,106,0.3);
}

p {
  color: var(--gold);
  font-size: 1.1rem;
  margin-top: 10px;
  max-width: 400px;
  line-height: 1.6;
}

button {
  margin-top: 25px;
  background: linear-gradient(90deg, var(--pink), var(--gold));
  border: none;
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  font-size: 1rem;
  transition: transform 0.3s, box-shadow 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,211,106,0.4);
}
</style>
</head>
<body>

<div id="particles"></div>

<div class="container">
  <img src="0330CE7F-D687-4CDE-B4A8-A8B559C05CD5.jpeg" alt="AI Logo" class="logo">
  <h1>مستقبلك مع الذكاء الاصطناعي يبدأ هنا</h1>
  <p>نوفّر حلولًا مدعّمة بالذكاء الاصطناعي لتطوير أعمالك، من التحليل الذكي إلى الإبداع الآلي.</p>
  <button>استكشف الذكاء الآن</button>
</div>

<script>
// تأثير جزيئات تفاعلية خفيفة
const particles = document.getElementById("particles");
document.addEventListener("mousemove", (e) => {
  const x = e.clientX / window.innerWidth;
  const y = e.clientY / window.innerHeight;
  particles.style.backgroundPosition = `${x * 100}% ${y * 100}%`;
});
</script>

</body>
</html>
