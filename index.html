<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASIC ===== */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Nunito Sans', sans-serif; }
html, body { height:100%; width:100%; overflow:hidden; background: #0f172a; }

/* ===== SMOOTH BACKGROUND GRADIENT WITH LIGHT GLOW ===== */
body {
    display: flex; justify-content:center; align-items:center; text-align:center;
    background: linear-gradient(135deg, #020617, #0f172a, #1e1e1e);
    animation: bgShift 20s ease infinite;
    position: relative;
}

body::before {
    content:'';
    position:absolute; width:500px; height:500px;
    background: #8a2be2; border-radius:50%;
    filter: blur(160px); opacity:0.5;
    animation: glowMove 10s infinite alternate ease-in-out;
    z-index:0;
}

body::after {
    content:'';
    position:absolute; width:400px; height:400px;
    background: #00f5ff; border-radius:50%;
    filter: blur(120px); opacity:0.3;
    animation: glowMoveAlt 14s infinite alternate ease-in-out;
    z-index:0;
}

@keyframes bgShift {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
}

@keyframes glowMove {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(50%, 50%) scale(1.1); }
}

@keyframes glowMoveAlt {
    from { transform: translate(50%, -50%) scale(1); }
    to { transform: translate(-50%, 50%) scale(1.05); }
}

/* ===== MAINTENANCE CARD ===== */
.maintenance-card {
    position: relative; z-index:1;
    max-width: 450px; padding:50px 35px;
    background: linear-gradient(145deg, rgba(30,30,30,0.95), rgba(20,20,30,0.85));
    border-radius:30px;
    box-shadow: 0 10px 40px rgba(138,43,226,0.5), 0 0 20px rgba(0,245,255,0.2);
    animation: fadeInUp 1s ease forwards;
}

/* ===== LOGO ===== */
.maintenance-card .logo {
    width:140px; margin-bottom:20px;
}

/* ===== TEXT ===== */
.maintenance-card h1 {
    font-size:2.2rem; font-weight:700;
    background: linear-gradient(90deg, #8a2be2, #00f5ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom:12px;
    line-height:1.2;
}

.maintenance-card p {
    font-size:16px; color:#ccc; margin-bottom:28px; line-height:1.5;
}

/* ===== BUTTON ===== */
.maintenance-card button {
    padding:12px 40px;
    background: linear-gradient(90deg, #8a2be2, #00f5ff);
    border:none; border-radius:20px;
    color:#fff; font-size:15px; font-weight:600;
    cursor:pointer;
    box-shadow: 0 0 25px rgba(138,43,226,0.5);
    transition:0.4s ease;
}

.maintenance-card button:hover {
    transform: scale(1.07);
    box-shadow: 0 0 35px rgba(0,245,255,0.7);
}

/* ===== COPYRIGHT ===== */
.maintenance-card .copyright {
    margin-top:20px; font-size:12px; color:#888;
}

/* ===== ANIMATION ===== */
@keyframes fadeInUp {
    from { opacity:0; transform:translateY(30px); }
    to { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div class="maintenance-card">
    <img src="https://i.top4top.io/p_37447l83x1.png" class="logo" alt="Beweble AI Logo">
    <h1> Under Maintenance</h1>
    <p>We're making improvements to give you a smoother, better experience.<br>Please check back shortly!</p>
    <button onclick="window.location.reload()">Refresh</button>
    <div class="copyright">Beweble AI © 2026 All rights reserved.</div>
</div>

</body>
</html>
