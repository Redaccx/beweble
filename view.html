<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tool View</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

#authOverlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
font-size:18px;
z-index:9999;
flex-direction:column;
gap:10px;
}

#content{
display:none;
padding:20px;
}

iframe{
width:100%;
height:90vh;
border:none;
background:white;
border-radius:10px;
}

input{
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#8a2be2;
color:white;
}
</style>
</head>

<body>

<div id="authOverlay">Checking...</div>

<div id="content">
<iframe id="frame"></iframe>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAgqj5rWFXuwldXm5-yFZj0POdS6rRYepo",
authDomain: "support-c1836.firebaseapp.com",
projectId: "support-c1836"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

let toolData = null;

const overlay = document.getElementById("authOverlay");
const content = document.getElementById("content");

onAuthStateChanged(auth, async (user) => {

if (!user) {
location.href = "index.html";
return;
}

if (!id) {
overlay.innerText = "No tool ID";
return;
}

const snap = await getDoc(doc(db, "tools", id));

if (!snap.exists()) {
overlay.innerText = "Tool not found";
return;
}

toolData = snap.data();

// 🔐 PRIVATE
if (toolData.visibility === "private") {

const pass = prompt("Enter password:");

if (pass !== toolData.password) {
overlay.innerText = "Wrong password";
return;
}
}

// ✔ PUBLIC أو صحيح password
showTool();

});

function showTool(){

overlay.style.display = "none";
content.style.display = "block";

const frame = document.getElementById("frame");
const docFrame = frame.contentDocument || frame.contentWindow.document;

docFrame.open();
docFrame.write(`
<!DOCTYPE html>
<html>
<head>
<style>${toolData.css || ""}</style>
</head>
<body>
${toolData.html || ""}
<script>${toolData.js || ""}<\/script>
</body>
</html>
`);
docFrame.close();

}

</script>

</body>
</html>
