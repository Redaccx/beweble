<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tool View</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

#authOverlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
font-size:18px;
z-index:9999;
}

#content{
display:none;
padding:20px;
}

iframe{
width:100%;
height:90vh;
border:none;
background:white;
border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOCK SCREEN -->
<div id="authOverlay">Checking login...</div>

<!-- 🔥 CONTENT -->
<div id="content">
<iframe id="frame"></iframe>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAgqj5rWFXuwldXm5-yFZj0POdS6rRYepo",
authDomain: "support-c1836.firebaseapp.com",
projectId: "support-c1836"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

onAuthStateChanged(auth, async (user) => {

const overlay = document.getElementById("authOverlay");
const content = document.getElementById("content");

if (!user) {
window.location.href = "index.html";
return;
}

if (!id) {
overlay.innerText = "No tool ID found";
return;
}

const snap = await getDoc(doc(db, "tools", id));

if (!snap.exists()) {
overlay.innerText = "Tool not found";
return;
}

const t = snap.data();

// 🔐 private check
if (t.visibility === "private" && t.uid !== user.uid) {
overlay.innerText = "This tool is private";
return;
}

overlay.style.display = "none";
content.style.display = "block";

const frame = document.getElementById("frame");
const docFrame = frame.contentDocument || frame.contentWindow.document;

docFrame.open();
docFrame.write(`
<!DOCTYPE html>
<html>
<head>
<style>${t.css || ""}</style>
</head>
<body>
${t.html || ""}
<script>${t.js || ""}<\/script>
</body>
</html>
`);
docFrame.close();

});

</script>

</body>
</html>
