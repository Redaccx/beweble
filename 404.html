<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 - Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Outfit', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at top left,#1f2140 0%,#0b0b0b 40%),
    #0b0b0b;
  color:white;
  overflow:hidden;
}

/* Glow background */
.glow{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#5865f2 0%,transparent 70%);
  filter:blur(100px);
  opacity:.25;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
}

/* Card */
.box{
  text-align:center;
  z-index:2;
  padding:40px;
}

h1{
  font-size:140px;
  font-weight:800;
  background:linear-gradient(90deg,#5865f2,#8a2be2,#00f5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(88,101,242,.2);
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

p{
  color:#a0a0a0;
  font-size:16px;
  margin-top:-10px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(88,101,242,.15);
  border:1px solid rgba(88,101,242,.3);
  color:#c3cbff;
  font-size:13px;
  margin-bottom:20px;
}

/* Button */
a{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-top:25px;
  padding:14px 28px;
  border-radius:16px;
  text-decoration:none;
  color:white;
  font-weight:600;
  background:linear-gradient(90deg,#8a2be2,#00f5ff);
  transition:.3s;
  box-shadow:0 10px 30px rgba(88,101,242,.25);
}

a:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 40px rgba(88,101,242,.4);
}

/* floating dots */
.dot{
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  opacity:.2;
  animation:move 8s linear infinite;
}

@keyframes move{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="glow"></div>

<script>
for(let i=0;i<40;i++){
  const d=document.createElement("div");
  d.className="dot";
  d.style.left=Math.random()*100+"vw";
  d.style.animationDuration=(4+Math.random()*8)+"s";
  document.body.appendChild(d);
}
</script>

<div class="box">
  <div class="badge">
    <i class="fa-solid fa-triangle-exclamation"></i>
    Error 404
  </div>

  <h1>404</h1>

  <p>Oops! The page you're looking for doesn’t exist.</p>

  <a href="/">
    <i class="fa-solid fa-house"></i>
    Back Home
  </a>
</div>

</body>
</html>
