<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<title>Tools</title>

<style>
body{
margin:0;
font-family:Nunito Sans;
background:#020617;
color:white;
}

#appContent{
display:none;
}

#authOverlay{
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
color:white;
font-size:20px;
flex-direction:column;
gap:10px;
}

.topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:#0f172a;
position:sticky;
top:0;
z-index:10;
}

.left,.right{
display:flex;
gap:10px;
align-items:center;
}

input{
padding:8px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(90deg, #8a2be2, #00f5ff);
color:white;
}

button:hover{background:#8a2be2}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#111827;
padding:15px;
width:90%;
max-width:600px;
border-radius:10px;
}

textarea{
width:94%;
height:80px;
margin:5px 0;
background:#0b1020;
color:#00f5ff;
border:none;
padding:10px;
font-family:monospace;
}

.container {
padding: 10px;
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
}

.card {
background: rgba(17, 24, 39, 0.8);
backdrop-filter: blur(10px);
padding: 16px;
border-radius: 16px;
border: 1px solid rgba(255, 255, 255, 0.08);
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
transition: 0.25s ease;
position: relative;
overflow: hidden;
height: 185px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:3px;
background:linear-gradient(90deg, #8a2be2, #00f5ff);
opacity:0.8;
}

.card:hover{
transform: translateY(-6px) scale(1.01);
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.card h3{
margin:0;
font-size:18px;
color:#00f5ff;
}

.card.big {
  height: 225px;
  padding: 20px;
}

.meta{
font-size:12px;
color:#a1a1aa;
margin-top:6px;
}

.small{
font-size:11px;
color:#71717a;
margin-top:3px;
}

.actions{
display:flex;
gap:8px;
margin-top:12px;
flex-wrap:wrap;
}

.run-btn,
.edit-btn,
.del-btn{
padding:7px 12px;
border-radius:10px;
font-size:13px;
}

.run-btn{background:linear-gradient(90deg, #8a2be2, #00f5ff);}
.edit-btn{background:linear-gradient(90deg, green, #00f5ff);}
.del-btn{background: linear-gradient(90deg, #8a2be2, red);}

.run-btn:hover,
.edit-btn:hover,
.del-btn:hover{
transform:scale(1.05);
}

#wordCount{
font-size:12px;
color:#a1a1aa;
margin-bottom:5px;
}

#desc {
height: 40px;
resize: none;
overflow: hidden;
white-space: nowrap;
}
.fav-btn {
  background: transparent;
  border: none;
  font-size: 18px;
  color: white;
  cursor: pointer;
}

.fav-btn i {
  transition: 0.2s;
}

.fav-btn:hover i {
  transform: scale(1.2);
  color: #facc15;
}
.share-btn {
  background:linear-gradient(90deg, green, #00f5ff);
  color: white;
  padding: 7px 12px;
  border-radius: 10px;
  font-size: 13px;
  border: none;
  cursor: pointer;
}

.share-btn:hover {
  transform: scale(1.05);
}

.export-btn{
  background:linear-gradient(90deg, green, #00f5ff);
  color:white;
  padding:7px 12px;
  border-radius:10px;
  font-size:13px;
  border:none;
  cursor:pointer;
}
.export-btn:hover{
  transform:scale(1.05);
}

/* =========================
   POPUP BACKDROP
========================= */
#commentPopup.popup{
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

/* =========================
   MAIN MODAL
========================= */
#commentPopup .popup-content{
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(22px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 14px;
  width: 70%;
  max-width: 600px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: popIn 0.2s ease;
}

@keyframes popIn{
  from{transform:scale(0.95);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* =========================
   TITLE
========================= */
#commentPopup h3{
  margin: 0;
  font-size: 16px;
  text-align: center;
  color: #00f5ff;
}

/* =========================
   COMMENTS LIST
========================= */
#commentsList{
  max-height: 320px;
  overflow-y: auto;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* scrollbar */
#commentsList::-webkit-scrollbar{
  width: 5px;
}
#commentsList::-webkit-scrollbar-thumb{
  background: linear-gradient(#8a2be2,#00f5ff);
  border-radius: 10px;
}

/* =========================
   COMMENT CARD
========================= */
.comment{
  background: rgba(11, 16, 32, 0.8);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 8px 10px;
  border-radius: 14px;
  position: relative;
  transition: 0.2s ease;
}

.comment:hover{
  transform: translateY(-1px);
  border-color: rgba(0,245,255,0.2);
}

/* username */
.comment b{
  font-size: 12px;
  color: #00f5ff;
}

/* text */
.comment p{
  margin: 4px 0;
  font-size: 13px;
  color: #e5e7eb;
}

/* time */
.comment small{
  font-size: 10px;
  opacity: 0.5;
}
.comment-btn{
  margin:5px;
  background: none !important;
}

/* =========================
   LIKE BUTTON
========================= */
.like-comment-btn{
  position: absolute;
  top: 6px;
  right: 8px;
  background: rgba(255,255,255,0.05) !important;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 3px 7px;
  font-size: 11px;
  color: #fb7185;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: 0.2s;
}

.like-comment-btn:hover{
  transform: scale(1.05);
  background: rgba(244,63,94,0.12) !important;
}

/* =========================
   ACTION BUTTONS (EDIT / DELETE)
========================= */
.comment .actions{
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.comment .edit-btn,
.comment .del-btn{
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

/* edit */
.comment .edit-btn{
  background: rgba(59,130,246,0.2);
  color: #60a5fa;
  border: 1px solid rgba(59,130,246,0.3);
}

.comment .edit-btn:hover{
  background: rgba(59,130,246,0.35);
  color: white;
}

/* delete */
.comment .del-btn{
  background: rgba(239,68,68,0.2);
  color: #f87171;
  border: 1px solid rgba(239,68,68,0.3);
}

.comment .del-btn:hover{
  background: rgba(239,68,68,0.35);
  color: white;
}

/* =========================
   INPUT
========================= */
#newComment{
  width: 94%;
  height: 65px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(11,16,32,0.8);
  color: white;
  padding: 8px;
  font-size: 13px;
  resize: none;
  outline: none;
}

#newComment:focus{
  border-color: #00f5ff;
  box-shadow: 0 0 0 2px rgba(0,245,255,0.15);
}

/* =========================
   BUTTONS ROW (SMALL)
========================= */
#commentPopup .popup-content button{
  padding: 7px 10px;
  font-size: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

/* SEND */
#commentPopup button[onclick="addComment()"]{
  background: linear-gradient(90deg,#8a2be2,#00f5ff);
  color: white;
}

#commentPopup button[onclick="addComment()"]:hover{
  transform: scale(1.03);
}

/* CLOSE */
#commentPopup button[onclick="closeComments()"]{
  background: rgba(255,255,255,0.06);
  color: #e5e7eb;
}

#commentPopup button[onclick="closeComments()"]:hover{
  background: rgba(255,255,255,0.12);
  color: white;
}

.like-comment-btn {
  background: none !important;
  border: none;
  outline: none;
  box-shadow: none;
  color: #f43f5e;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  float: right;
}

.like-comment-btn:active,
.like-comment-btn:focus {
  background: none !important;
  box-shadow: none !important;
}
.status-dot{
  position:absolute;
  top:10px;
  right:10px; /* 👈 بدل left */
  width:10px;
  height:10px;
  border-radius:50%;
  box-shadow:0 0 8px currentColor;
}

/* الحالات */
.status-green{
  background:#22c55e;
  color:#22c55e;
}

.status-yellow{
  background:#facc15;
  color:#facc15;
}

.status-red{
  background:#ef4444;
  color:#ef4444;
}

</style>
</head>

<body>

<!-- 🔐 AUTH OVERLAY -->
<div id="authOverlay">Checking login...</div>

<!-- 🔥 APP CONTENT -->
<div id="appContent">

<div class="topbar">
<div class="left">
<input id="search" placeholder="Search...">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('mine')">My Tools</button>
</div>

<div class="right">
<button onclick="openPopup()">+ Add Tool</button>
</div>
</div>

<div id="list" class="container"></div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">

<h3 id="popupTitle">Create Tool</h3>

<input id="name" placeholder="Tool Name">

<textarea id="desc" placeholder="Description" oninput="updateWordCount()"></textarea>
<div id="wordCount">0/30</div>

<select id="visibility">
  <option value="public">Public</option>
  <option value="private">Private</option>
</select>

<select id="status">
  <option value="green">🟢 Active</option>
  <option value="yellow">🟡 Maintenance</option>
  <option value="red">🔴 Stopped</option>
</select>
<input id="password" placeholder="Password (required for private)" style="display:none;">

<textarea id="html" placeholder="HTML"></textarea>
<textarea id="css" placeholder="CSS"></textarea>
<textarea id="js" placeholder="JS"></textarea>

<button onclick="saveTool()">Save</button>
<button onclick="closePopup()">Close</button>

</div>
</div>


<div id="commentPopup" class="popup">
    <div class="popup-content">
        
        <h3>Comments</h3>
        
        <div id="commentsList"></div>
        
        <textarea id="newComment" placeholder="Write comment..."></textarea>
        
        <button onclick="addComment()">Send</button>
        <button onclick="closeComments()">Close</button>
        
    </div>
</div>
<!-- VIEW -->
<div id="viewPopup" class="popup">
<div class="popup-content">
<h3>Preview</h3>
<iframe id="viewFrame" style="width:100%;height:600px;border:none;background:white"></iframe>
<button onclick="closeView()">Close</button>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  serverTimestamp,
  updateDoc,
  query,
  where,
  increment,
  getDocs,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAgqj5rWFXuwldXm5-yFZj0POdS6rRYepo",
authDomain: "support-c1836.firebaseapp.com",
projectId: "support-c1836"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let filter = "all";
let searchText = "";
let unsubscribe = null;
let editingId = null;
let currentToolId = null;
let toolOwnerId = null;

/* AUTH CHECK */
onAuthStateChanged(auth, user => {
  const overlay = document.getElementById("authOverlay");
  const appContent = document.getElementById("appContent");
  
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  
  overlay.style.display = "none";
  appContent.style.display = "block";
  
  loadTools();
  
  document.getElementById("search").addEventListener("input", (e) => {
    searchText = e.target.value.toLowerCase();
    loadTools();
  });
  
});

/* POPUP */
window.openPopup = ()=>{
document.getElementById("popup").style.display="flex";
document.getElementById("popupTitle").innerText = editingId ? "Edit Tool" : "Create Tool";
};

window.closePopup = ()=>{
document.getElementById("popup").style.display="none";

editingId = null;
document.getElementById("name").value="";
document.getElementById("desc").value="";
document.getElementById("html").value="";
document.getElementById("css").value="";
document.getElementById("js").value="";
document.getElementById("wordCount").innerText="0/30";

document.getElementById("password").style.display="none";
document.getElementById("password").value="";
};

/* visibility */
document.getElementById("visibility").onchange = (e)=>{
const pass = document.getElementById("password");
if(e.target.value === "private"){
pass.style.display = "block";
} else {
pass.style.display = "none";
pass.value = "";
}
};

/* VIEW */
/* VIEW */
window.openView = (html, css, js) => {
    const frame = document.getElementById("viewFrame");
    const doc = frame.contentDocument || frame.contentWindow.document;
    
    doc.open();
    doc.write(`
  <!DOCTYPE html>
  <html>
  <head><style>${css}</style></head>
  <body>
  ${html}
  <script>${js}<\/script>
  </body>
  </html>
  `);
    doc.close();
    
    document.getElementById("viewPopup").style.display = "flex";
};

window.closeView = () => {
    document.getElementById("viewPopup").style.display = "none";
};

/* 👇 هون حط التعليقات */
/* COMMENTS */
window.openComments = (toolId, ownerId) => {
    currentToolId = toolId;
    toolOwnerId = ownerId;
    
    document.getElementById("commentPopup").style.display = "flex";
    loadComments(toolId);
};

window.closeComments = () => {
    document.getElementById("commentPopup").style.display = "none";
};

/* 👇 هون حطها */
window.addComment = async () => {
  const text = document.getElementById("newComment").value.trim();
  if (!text) return;
  
  const uid = auth.currentUser.uid;
  
  const q = query(
    collection(db, "tools", currentToolId, "comments"),
    where("uid", "==", uid)
  );
  
  const snap = await getDocs(q);
  
  if (!snap.empty) {
    alert("You already commented!");
    return;
  }
  
  await addDoc(collection(db, "tools", currentToolId, "comments"), {
  text,
  uid,
  owner: auth.currentUser.email,
  likes: 0,
  likedBy: [],
  createdAt: serverTimestamp()
});
  
  document.getElementById("newComment").value = "";
};

/* FILTER */
window.setFilter = (f)=>{
filter = f;
loadTools();
};

/* WORD LIMIT */
function limitChars(text,max=30){
return text.slice(0,max);
}

window.updateWordCount=()=>{
let text=document.getElementById("desc").value;
text=text.replace(/\n/g," ");

if(text.length>30){
text=limitChars(text,30);
document.getElementById("desc").value=text;
}

document.getElementById("wordCount").innerText=text.length+"/30";
};

/* SAVE */
window.saveTool=async()=>{
const user=auth.currentUser;
if(!user){return;}

const visibility=document.getElementById("visibility").value;
const password=document.getElementById("password").value;

if(visibility==="private"&&!password){
alert("Password required");
return;
}

const data={
name:document.getElementById("name").value,
desc:limitChars(document.getElementById("desc").value,30),
html:document.getElementById("html").value,
css:document.getElementById("css").value,
js:document.getElementById("js").value,
uid:user.uid,
owner:user.email,
visibility,
password: visibility === "private" ?
  document.getElementById("password").value :
  null,
  status: document.getElementById("status").value
};

if(editingId){
await updateDoc(doc(db,"tools",editingId),data);
editingId=null;
}else{
await addDoc(collection(db, "tools"), data, {
  text,
  uid,
  owner: auth.currentUser.email,
  likes: 0,
  likedBy: [],
  createdAt: serverTimestamp()
});
}

closePopup();
};

/* RUN */
async function runTool(t,id){

if(t.visibility==="private"){
const pass=prompt("Enter password:");
if(pass!==t.password){
alert("Wrong password");
return;
}
}

await updateDoc(doc(db, "tools", id), {
  views: increment(1)
});
openView(t.html,t.css,t.js);
}

/* LOAD */
function loadTools() {
  
  if (unsubscribe) unsubscribe();
  
  unsubscribe = onSnapshot(collection(db, "tools"), snap => {
    
    const list = document.getElementById("list");
    list.innerHTML = "";
    
    snap.forEach(d => {
      
      const t = d.data();
      const id = d.id;
      
      const textMatch =
        (t.name?.toLowerCase().includes(searchText) ||
          t.desc?.toLowerCase().includes(searchText));
      
      const isMine = auth.currentUser?.uid === t.uid;
      const isPublic = t.visibility === "public";
      
      if (filter === "mine" && !isMine) return;
      
      if (filter !== "all") {
        if (filter === "mine" && !isMine) return;
        if (filter === "public" && !isPublic) return;
      }
      
      if (searchText && !textMatch) return;
      
      const card = document.createElement("div");
      card.className = "card";
      
      if (filter === "mine") {
        card.classList.add("big");
      }
      
      let actions = `
    <button class="run-btn">Run</button>
    <button class="share-btn"><i class="fa fa-share"></i></button>
    <button class="export-btn"><i class="fa fa-download"></i></button>
  `;
      
      if (isMine && filter === "mine") {
        actions += `
      <button class="edit-btn">Edit</button>
      <button class="del-btn">Delete</button>
    `;
      }
      
      card.innerHTML = `
    <div class="status-dot status-${t.status || 'green'}"></div>

    <h3>${t.name}</h3>

    <div class="meta">
      <i class="fa fa-user"></i> ${t.owner}
    </div>

    <div class="small">
      <i class="fa fa-eye"></i> ${t.views || 0} views
    </div>

    <div class="small">
      <i class="fa ${t.visibility === 'private' ? 'fa-lock' : 'fa-unlock'}"></i>
      ${t.visibility}
    </div>

    <div class="small">
      <i class="fa fa-align-left"></i> ${t.desc || ""}
    </div>

    <div class="actions">${actions}</div>

    <button class="comment-btn">View Comments</button>
  `;
      
      // ▶️ RUN
      card.querySelector(".run-btn").onclick = () => runTool(t, id);
      
      // 🔗 SHARE
      card.querySelector(".share-btn").onclick = () => {
        const url = `${window.location.origin}/view.html?id=${id}`;
        
        navigator.clipboard.writeText(url)
          .then(() => alert("Link copied!"))
          .catch(() => prompt("Copy link:", url));
      };
      
      // 💬 COMMENTS
      const commentBtn = card.querySelector(".comment-btn");
      if (commentBtn) {
        commentBtn.onclick = () => openComments(id, t.uid);
      }
      
      // 📥 EXPORT
      const exportBtn = card.querySelector(".export-btn");
      if (exportBtn) {
        exportBtn.onclick = () => exportTool(t);
      }
      
      // ✏️ EDIT + 🗑 DELETE
      if (isMine && filter === "mine") {
        
        card.querySelector(".edit-btn").onclick = () => {
          document.getElementById("visibility").value = t.visibility;
          
          if (t.visibility === "private") {
            document.getElementById("password").style.display = "block";
            document.getElementById("password").value = t.password || "";
          } else {
            document.getElementById("password").style.display = "none";
          }
          
          editingId = id;
          
          document.getElementById("name").value = t.name;
          document.getElementById("desc").value = t.desc || "";
          document.getElementById("html").value = t.html;
          document.getElementById("css").value = t.css;
          document.getElementById("js").value = t.js;
          
          updateWordCount();
          openPopup();
        };
        
        card.querySelector(".del-btn").onclick = async () => {
          await deleteDoc(doc(db, "tools", id));
        };
      }
      
      list.appendChild(card);
      
    });
    
  });
}

function loadComments(toolId) {
  const list = document.getElementById("commentsList");
  
  onSnapshot(collection(db, "tools", toolId, "comments"), snap => {
    
    const comments = [];
    
    snap.forEach(d => {
      comments.push({ id: d.id, ...d.data() });
    });
    
    // الأحدث فوق
    comments.sort((a, b) =>
      (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)
    );
    
    list.innerHTML = "";
    
    comments.forEach(c => {
      
      const currentUser = auth.currentUser;
      if (!currentUser) return;
      
      const isCommentOwner = currentUser.uid === c.uid;
      const isToolOwner = currentUser.uid === toolOwnerId;
      
      const canDelete = isCommentOwner || isToolOwner;
      
      const div = document.createElement("div");
      div.className = "comment";
      
      div.innerHTML = `
        <b>${c.owner}</b>
        <p>${c.text}</p>

        <small>
          ${c.createdAt?.toDate
            ? new Date(c.createdAt.toDate()).toLocaleString()
            : "Just now"}
        </small>

        <button class="like-comment-btn">
          <i class="fa fa-heart-o"></i>
          <span>${c.likes || 0}</span>
        </button>

        <div class="actions">
          ${isCommentOwner ? `<button class="edit-btn">Edit</button>` : ""}
          ${canDelete ? `<button class="del-btn">Delete</button>` : ""}
        </div>
      `;
      
      // =======================
      // ❤️ LIKE SYSTEM (FIXED)
      // =======================
      const likeBtn = div.querySelector(".like-comment-btn");
      const icon = likeBtn.querySelector("i");
      const count = likeBtn.querySelector("span");
      
      // حالة القلب عند التحميل
      if (c.likedBy?.includes(currentUser.uid)) {
        icon.classList.remove("fa-heart-o");
        icon.classList.add("fa-heart");
      }
      
      likeBtn.onclick = async () => {
        const uid = currentUser.uid;
        
        let likedBy = c.likedBy || [];
        let likes = c.likes || 0;
        
        const alreadyLiked = likedBy.includes(uid);
        
        if (alreadyLiked) {
          likedBy = likedBy.filter(u => u !== uid);
          likes = Math.max(0, likes - 1);
          
          icon.classList.remove("fa-heart");
          icon.classList.add("fa-heart-o");
          
        } else {
          likedBy.push(uid);
          likes += 1;
          
          icon.classList.remove("fa-heart-o");
          icon.classList.add("fa-heart");
        }
        
        // 🔥 تحديث فوري للواجهة
        count.innerText = likes;
        
        await updateDoc(doc(db, "tools", toolId, "comments", c.id), {
          likes,
          likedBy
        });
      };
      
      // 🗑 DELETE
      if (canDelete) {
        div.querySelector(".del-btn").onclick = async () => {
          await deleteDoc(doc(db, "tools", toolId, "comments", c.id));
        };
      }
      
      // ✏️ EDIT
      if (isCommentOwner) {
        div.querySelector(".edit-btn").onclick = async () => {
          const newText = prompt("Edit comment:", c.text);
          if (newText?.trim()) {
            await updateDoc(doc(db, "tools", toolId, "comments", c.id), {
              text: newText.trim()
            });
          }
        };
      }
      
      list.appendChild(div);
    });
  });
}
function exportTool(t) {
  
  const escapeJS = (code = "") =>
    code.replace(/<\/script>/g, "<\\/script>");
  
  const content = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${t.name || "tool"}</title>

<style>
${t.css || ""}
</style>
</head>

<body>

${t.html || ""}

<script>
try {
${escapeJS(t.js || "")}
} catch (e) {
  console.error(e);
}
<\/script>

</body>
</html>
`;
  
  const blob = new Blob([content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = "tool.txt";
  a.click();
  
  URL.revokeObjectURL(url);
}
</script>
