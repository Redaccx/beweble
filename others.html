<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<title>Tools</title>

<style>
body{
margin:0;
font-family:Nunito Sans;
background:#020617;
color:white;
}

#appContent{
display:none;
}

#authOverlay{
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
color:white;
font-size:20px;
flex-direction:column;
gap:10px;
}

.topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:#0f172a;
position:sticky;
top:0;
z-index:10;
}

.left,.right{
display:flex;
gap:10px;
align-items:center;
}

input{
padding:8px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(90deg, #8a2be2, #00f5ff);
color:white;
}

button:hover{background:#8a2be2}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popup-content {
  background: rgba(17, 24, 39, 0.75);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  
  padding: 15px;
  width: 90%;
  max-width: 600px;
  
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
  
  /* 🔥 الحل */
  max-height: 70vh;
  overflow-y: auto;
}
textarea{
width:94%;
height:80px;
margin:5px 0;
background:#0b1020;
color:#00f5ff;
border:none;
padding:10px;
font-family:monospace;
}

.container {
padding: 10px;
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
}


#search {
  padding: 10px 14px 10px 36px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);

  background: rgba(17, 24, 39, 0.6);
  backdrop-filter: blur(14px);

  color: white;
  font-size: 14px;
  outline: none;

  width: 260px;

  transition: all 0.3s ease;
}

/* placeholder */
#search::placeholder {
  color: #6b7280;
  transition: 0.2s;
}

/* hover */
#search:hover {
  border-color: rgba(168, 85, 247, 0.4); /* بنفسجي ناعم */
}

/* 🔥 focus بنفسجي */
#search:focus {
  width: 230px;
  border-color: #a855f7;

  box-shadow:
    0 0 0 2px rgba(168, 85, 247, 0.2),
    0 0 18px rgba(168, 85, 247, 0.35);

  background: rgba(17, 24, 39, 0.85);
}

/* placeholder fade */
#search:focus::placeholder {
  opacity: 0.4;
}
.card {
  background: rgba(17, 24, 39, 0.8);
  backdrop-filter: blur(10px);
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  transition: 0.25s ease;
  position: relative;
  overflow: hidden;
  height:210px;
  min-height:230px;
 

  display: flex;
  flex-direction: column;
  gap: 8px; /* 🔥 بدل space-between */
}
.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:3px;
background:linear-gradient(90deg, #8a2be2, #00f5ff);
opacity:0.8;
}

.card:hover{
transform: translateY(-6px) scale(1.01);
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.card h3{
margin:0;
font-size:18px;
color:#00f5ff;
}

.card.big {
  height: 200px;
  min-height: 210px;
  padding: 20px;
}

.meta{
font-size:12px;
color:#a1a1aa;
margin-top:6px;
}

.small{
font-size:11px;
color:#71717a;
margin-top:3px;
}

.actions{
display:flex;
gap:8px;
margin-top:12px;
flex-wrap:wrap;
}

.run-btn,
.edit-btn,
.del-btn{
padding:7px 12px;
border-radius:10px;
font-size:13px;
}

.run-btn{background:linear-gradient(90deg, #8a2be2, #00f5ff);}
.edit-btn{background:linear-gradient(90deg, green, #00f5ff);}
.del-btn{background: linear-gradient(90deg, #8a2be2, red);}

.run-btn:hover,
.edit-btn:hover,
.del-btn:hover{
transform:scale(1.05);
}

#wordCount{
font-size:12px;
color:#a1a1aa;
margin-bottom:5px;
}

#desc {

resize: none;
overflow: hidden;
height: auto;

white-space: normal;
}
.fav-btn {
  background: transparent;
  border: none;
  font-size: 18px;
  color: white;
  cursor: pointer;
}

.fav-btn i {
  transition: 0.2s;
}

.fav-btn:hover i {
  transform: scale(1.2);
  color: #facc15;
}
.share-btn {
  background:linear-gradient(90deg, green, #00f5ff);
  color: white;
  padding: 7px 12px;
  border-radius: 10px;
  font-size: 13px;
  border: none;
  cursor: pointer;
}

.share-btn:hover {
  transform: scale(1.05);
}

.export-btn{
  background:linear-gradient(90deg, green, #00f5ff);
  color:white;
  padding:7px 12px;
  border-radius:10px;
  font-size:13px;
  border:none;
  cursor:pointer;
}
.export-btn:hover{
  transform:scale(1.05);
}



/* =========================
   POPUP BACKDROP
========================= */
#commentPopup.popup{
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

/* =========================
   MAIN MODAL
========================= */
#commentPopup .popup-content{
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(22px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 14px;
  width: 70%;
  max-width: 600px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: popIn 0.2s ease;
}

@keyframes popIn{
  from{transform:scale(0.95);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* =========================
   TITLE
========================= */
#commentPopup h3{
  margin: 0;
  font-size: 16px;
  text-align: center;
  color: #00f5ff;
}

/* =========================
   COMMENTS LIST
========================= */
#commentsList{
  max-height: 320px;
  overflow-y: auto;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* scrollbar */
#commentsList::-webkit-scrollbar{
  width: 5px;
}
#commentsList::-webkit-scrollbar-thumb{
  background: linear-gradient(#8a2be2,#00f5ff);
  border-radius: 10px;
}

/* =========================
   COMMENT CARD
========================= */
.comment{
  background: rgba(11, 16, 32, 0.8);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 8px 10px;
  border-radius: 14px;
  position: relative;
  transition: 0.2s ease;
}

.comment:hover{
  transform: translateY(-1px);
  border-color: rgba(0,245,255,0.2);
}

/* username */
.comment b{
  font-size: 12px;
  color: #00f5ff;
}

/* text */
.comment p{
  margin: 4px 0;
  font-size: 13px;
  color: #e5e7eb;
}

/* time */
.comment small{
  font-size: 10px;
  opacity: 0.5;
}
.comment-btn{
  margin:5px;
  background: none !important;
}

/* =========================
   LIKE BUTTON
========================= */
.like-comment-btn{
  position: absolute;
  top: 6px;
  right: 8px;
  background: rgba(255,255,255,0.05) !important;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 3px 7px;
  font-size: 11px;
  color: #fb7185;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: 0.2s;
}

.like-comment-btn:hover{
  transform: scale(1.05);
  background: rgba(244,63,94,0.12) !important;
}

/* =========================
   ACTION BUTTONS (EDIT / DELETE)
========================= */
.comment .actions{
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.comment .edit-btn,
.comment .del-btn{
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

/* edit */
.comment .edit-btn{
  background: rgba(59,130,246,0.2);
  color: #60a5fa;
  border: 1px solid rgba(59,130,246,0.3);
}

.comment .edit-btn:hover{
  background: rgba(59,130,246,0.35);
  color: white;
}

/* delete */
.comment .del-btn{
  background: rgba(239,68,68,0.2);
  color: #f87171;
  border: 1px solid rgba(239,68,68,0.3);
}

.comment .del-btn:hover{
  background: rgba(239,68,68,0.35);
  color: white;
}

/* =========================
   INPUT
========================= */
#newComment{
  width: 94%;
  height: 65px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(11,16,32,0.8);
  color: white;
  padding: 8px;
  font-size: 13px;
  resize: none;
  outline: none;
}

#newComment:focus{
  border-color: #00f5ff;
  box-shadow: 0 0 0 2px rgba(0,245,255,0.15);
}

/* =========================
   BUTTONS ROW (SMALL)
========================= */
#commentPopup .popup-content button{
  padding: 7px 10px;
  font-size: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

/* SEND */
#commentPopup button[onclick="addComment()"]{
  background: linear-gradient(90deg,#8a2be2,#00f5ff);
  color: white;
}

#commentPopup button[onclick="addComment()"]:hover{
  transform: scale(1.03);
}

/* CLOSE */
#commentPopup button[onclick="closeComments()"]{
  background: rgba(255,255,255,0.06);
  color: #e5e7eb;
}

#commentPopup button[onclick="closeComments()"]:hover{
  background: rgba(255,255,255,0.12);
  color: white;
}

.like-comment-btn {
  background: none !important;
  border: none;
  outline: none;
  box-shadow: none;
  color: #f43f5e;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  float: right;
}

.like-comment-btn:active,
.like-comment-btn:focus {
  background: none !important;
  box-shadow: none !important;
}
.status-dot{
  position:absolute;

  background: green;
  top:17px;
  right:39px; /* 👈 بدل left */
  width:10px;
  height:10px;
  border-radius:50%;
  box-shadow:0 0 8px currentColor;
}

shhs

/* الحالات */
.status-green{
  background:#22c55e;
  color:#22c55e;
}

.status-yellow{
  background:#facc15;
  color:#facc15;
}

.status-red{
  background:#ef4444;
  color:#ef4444;
}


.dropdown {
  position: relative;
  display: inline-block;
}
/* الزر الأساسي */
.dropbtn {
  width: 44px;
  height: 44px;
  
  display: flex;
  align-items: center;
  justify-content: center;
  
  border-radius: 14px;
  
  background: rgba(17, 24, 39, 0.6);
  backdrop-filter: blur(14px);
  
  border: 1px solid rgba(255, 255, 255, 0.06);
  
  color: #a855f7;
  font-size: 18px;
  
  cursor: pointer;
  
  transition: 0.25s ease;
  
  box-shadow: 0 0 0 rgba(168, 85, 247, 0);
}

/* hover glow بنفسجي */
.dropbtn:hover {
  transform: translateY(-2px) scale(1.05);
  
  border-color: rgba(168, 85, 247, 0.5);
  
  box-shadow:
    0 0 12px rgba(168, 85, 247, 0.35),
    0 0 25px rgba(168, 85, 247, 0.2);
}

/* القائمة */
.dropdown-content {
  position: absolute;
  top: 115%;
  right: 0;
  
  width: 190px;
  
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(20px);
  
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  
  padding: 8px;
  
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
  
  display: flex;
  flex-direction: column;
  gap: 6px;
  
  opacity: 0;
  transform: translateY(-10px) scale(0.98);
  pointer-events: none;
  
  transition: 0.25s ease;
}

/* show animation */
.dropdown-content.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

/* buttons داخل القائمة */
.dropdown-content button {
  display: flex;
  align-items: center;
  gap: 10px;
  
  padding: 10px 12px;
  
  border: none;
  border-radius: 12px;
  
  background: transparent;
  color: #e5e7eb;
  
  cursor: pointer;
  
  transition: 0.2s ease;
  font-size: 13px;
}

/* hover item */
.dropdown-content button:hover {
  background: rgba(168, 85, 247, 0.12);
  color: #a855f7;
  transform: translateX(4px);
}

/* divider */
.dropdown-content hr {
  border: none;
  height: 1px;
  background: rgba(255, 255, 255, 0.08);
  margin: 4px 0;
}

.tool-menu {
  position: absolute;
  top: 10px;
  right: 10px;  /* 👈 بدل left */
  left: auto;
}

.tool-dots {
  background: rgba(255, 255, 255, 0.05);
  border: none;
  color: white;
  padding: 5px 9px;
  border-radius: 8px;
  cursor: pointer;
}

.tool-box {
  display: none;
  position: absolute;
  top: 40px;

  right: 0;   /* 👈 تفتح على طرف الكارد اليمين */
  left: auto;

  background: rgba(15, 23, 42, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  overflow: hidden;
  z-index: 100;
}
.tool-box button {
  display: block;
  width: 120px;
  padding: 8px;
  background: none;
  border: none;
  color: white;
  text-align: left;
  cursor: pointer;
}

.tool-box button:hover {
  background: rgba(168, 85, 247, 0.2);
}

.all-card .status-dot {
  top: 17px;
  right: 20px;
}
#name {
  width: 100%;
  max-width: 260px;

  padding: 10px 14px;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);

  background: rgba(17, 24, 39, 0.7);
  backdrop-filter: blur(12px);

  color: #e5e7eb;
  font-size: 14px;

  outline: none;           /* 🔥 يمنع الخط الخارجي */
  box-sizing: border-box;  /* 🔥 يمنع الخروج */

  caret-color: #00f5ff;    /* 🔥 لون المؤشر */
}

/* 🔥 focus نظيف */
#name:focus {
  border-color: #a855f7;

  box-shadow:
    0 0 0 2px rgba(168, 85, 247, 0.2),
    0 0 10px rgba(168, 85, 247, 0.25);
}

.tool-title {
  margin: 0;
  font-size: 18px;
  color: #00f5ff;
  
  line-height: 1.3;
  
  white-space: normal;
}

@media (max-width: 380px) {
  .container {
    grid-template-columns: 1fr;
  }
  
  .card {
    height: auto;
    min-height: 200px;
  }
  
  #search {
    width: 160px;
  }
}
</style>
</head>

 <button class="dropbtn" onclick="toggleMenu()">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  serverTimestamp,
  updateDoc,
  query,
  where,
  orderBy,
  increment,
  getDocs,
  getDoc,
  setDoc // 🔥 لازم تضيفها
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAgqj5rWFXuwldXm5-yFZj0POdS6rRYepo",
authDomain: "support-c1836.firebaseapp.com",
projectId: "support-c1836"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let filter = "all";
let searchText = "";
let unsubscribe = null;
let editingId = null;
let currentToolId = null;
let toolOwnerId = null;

/* AUTH CHECK */
onAuthStateChanged(auth, async (user) => {
  const overlay = document.getElementById("authOverlay");
  const appContent = document.getElementById("appContent");
  
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  
  // 🔥 إنشاء username أول مرة فقط
  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);
  
  if (!snap.exists()) {
    await setDoc(userRef, {
  username: "User_" + user.uid.slice(0, 6)
});
  }
  
  overlay.style.display = "none";
  appContent.style.display = "block";
  
  loadTools();
  
  document.getElementById("search").addEventListener("input", (e) => {
    searchText = e.target.value.toLowerCase();
    loadTools();
  });
});

/* POPUP */
window.openPopup = ()=>{
document.getElementById("popup").style.display="flex";
document.getElementById("popupTitle").innerText = editingId ? "Edit Tool" : "Create Tool";
};

window.closePopup = ()=>{
document.getElementById("popup").style.display="none";

editingId = null;
document.getElementById("name").value="";
document.getElementById("desc").value="";
document.getElementById("html").value="";
document.getElementById("css").value="";
document.getElementById("js").value="";
document.getElementById("wordCount").innerText="0/30";

document.getElementById("password").style.display="none";
document.getElementById("password").value="";
};

/* visibility */
document.getElementById("visibility").onchange = (e)=>{
const pass = document.getElementById("password");
if(e.target.value === "private"){
pass.style.display = "block";
} else {
pass.style.display = "none";
pass.value = "";
}
};

/* VIEW */
/* VIEW */
window.openView = (html, css, js) => {
    const frame = document.getElementById("viewFrame");
    const doc = frame.contentDocument || frame.contentWindow.document;
    
    doc.open();
    doc.write(`
  <!DOCTYPE html>
  <html>
  <head><style>${css}</style></head>
  <body>
  ${html}
  <script>${js}<\/script>

window.addComment = async () => {

  if (!text) return;
  
  const user = auth.currentUser;
  const uid = user.uid;
  
  // 🔥 جيب username من Firestore
  const userSnap = await getDoc(doc(db, "users", uid));
  
  const username = userSnap.exists() ?
    userSnap.data().username :
    user.email.split("@")[0];
  
  await addDoc(collection(db, "tools", currentToolId, "comments"), {
    text,
    uid,
    owner: username, // ✅ هون الاسم الصحيح
    likes: 0,
    likedBy: [],

  });
  
  document.getElementById("newComment").value = "";

/* WORD LIMIT */
function limitChars(text,max=30){
return text.slice(0,max);
}

window.updateWordCount=()=>{
let text=document.getElementById("desc").value;
text=text.replace(/\n/g," ");

if(text.length>30){
text=limitChars(text,30);
document.getElementById("desc").value=text;
}

document.getElementById("wordCount").innerText=text.length+"/30";
};

/* SAVE */
window.saveTool = async () => {
  const user = auth.currentUser;
  if (!user) return;
  
  const visibility = document.getElementById("visibility").value;
  const password = document.getElementById("password").value;
  
  if (visibility === "private" && !password) {
    alert("Password required");
    return;
  }
  
  // 🔥 جلب username من Firestore
  const userSnap = await getDoc(doc(db, "users", user.uid));
  const username =
    userSnap.exists() ?
    userSnap.data().username :
    user.email.split("@")[0];
  
  const data = {
    name: document.getElementById("name").value,
    desc: limitChars(document.getElementById("desc").value, 30),
    html: document.getElementById("html").value,
    css: document.getElementById("css").value,
    js: document.getElementById("js").value,
    ownerId: user.uid,  
    ownerName: username,
  uid: user.uid,
  email: user.email,
    visibility,
    password: visibility === "private" ? password : null,
    status: document.getElementById("status").value
  };
  
  if (editingId) {
    await updateDoc(doc(db, "tools", editingId), data);
    editingId = null;
  } else {
    await addDoc(collection(db, "tools"), {
      ...data,
      likes: 0,
      likedBy: [],
      views: 0,
      createdAt: serverTimestamp()
    });
  }
  
  closePopup();
};

let unsubscribeComments = null;

function loadComments(toolId) {
  const list = document.getElementById("commentsList");
  
  // 🧹 امسح listener القديم
  if (unsubscribeComments) unsubscribeComments();
  
  // ⏳ loading
  list.innerHTML = "Loading...";
  
  unsubscribeComments = onSnapshot(
    query(
      collection(db, "tools", toolId, "comments"),
      orderBy("createdAt", "desc")
    ),
    snap => {
      
      list.innerHTML = "";
      
      const currentUser = auth.currentUser;
if (!currentUser) return;


      
      snap.forEach(d => {
        const c = { id: d.id, ...d.data() };
        
        const isCommentOwner = currentUser.uid === c.uid;
        const isToolOwner = currentUser.uid === toolOwnerId;
        const canDelete = isCommentOwner || isToolOwner;
        
        const div = document.createElement("div");
        div.className = "comment";
        
        div.innerHTML = `
          <b>${c.owner}</b>
          <p>${c.text}</p>

          <small>
            ${c.createdAt?.toDate
              ? new Date(c.createdAt.toDate()).toLocaleString()
              : "Just now"}
          </small>

          <button class="like-comment-btn">
            <i class="fa ${c.likedBy?.includes(currentUser.uid) ? "fa-heart" : "fa-heart-o"}"></i>
            <span>${c.likes || 0}</span>
          </button>

          <div class="actions">
            ${isCommentOwner ? `<button class="edit-btn">Edit</button>` : ""}
            ${canDelete ? `<button class="del-btn">Delete</button>` : ""}
          </div>
        `;
        
        // ❤️ LIKE (محمي + سريع)
        const likeBtn = div.querySelector(".like-comment-btn");
        const icon = likeBtn.querySelector("i");
        const count = likeBtn.querySelector("span");
        
        likeBtn.onclick = async () => {
          const uid = currentUser.uid;
          
          let likedBy = c.likedBy || [];
          const alreadyLiked = likedBy.includes(uid);
          
          if (alreadyLiked) {
            likedBy = likedBy.filter(u => u !== uid);
            
            icon.classList.remove("fa-heart");
            icon.classList.add("fa-heart-o");
            
            count.innerText = Math.max(0, (c.likes || 0) - 1);
            
            await updateDoc(doc(db, "tools", toolId, "comments", c.id), {
              likes: increment(-1),
              likedBy
            });
            
          } else {
            likedBy.push(uid);
            
            icon.classList.remove("fa-heart-o");
            icon.classList.add("fa-heart");
            
            count.innerText = (c.likes || 0) + 1;
            
            await updateDoc(doc(db, "tools", toolId, "comments", c.id), {
              likes: increment(1),
              likedBy
            });
          }
        };
        
        // 🗑 DELETE
        if (canDelete) {
          div.querySelector(".del-btn").onclick = async () => {
            await deleteDoc(doc(db, "tools", toolId, "comments", c.id));
          };
        }
        
        // ✏️ EDIT
        if (isCommentOwner) {
          div.querySelector(".edit-btn").onclick = async () => {
            const newText = prompt("Edit comment:", c.text);
            if (newText?.trim()) {
              await updateDoc(doc(db, "tools", toolId, "comments", c.id), {
                text: newText.trim()
              });
            }
          };
        }
        
        list.appendChild(div);
      });
    },
    err => {
      console.error("🔥 Comments error:", err);
      list.innerHTML = "Error loading comments";
    }
  );
}
function exportTool(t) {
  
  const escapeJS = (code = "") =>
    code.replace(/<\/script>/g, "<\\/script>");
  
  const content = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${t.name || "tool"}</title>

<style>
${t.css || ""}
</style>
</head>

<body>

${t.html || ""}

<script>
try {
${escapeJS(t.js || "")}
} catch (e) {
  console.error(e);
}
<\/script>

</body>
</html>
`;
  
  const blob = new Blob([content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = "tool.txt";
  a.click();
  
  URL.revokeObjectURL(url);
}

// =========================
// TOOL NAME FORMAT (IMPORTANT)
// =========================
function formatToolName(name) {
  if (!name) return "";
  
  let clean = name.trim().replace(/\s+/g, " ");
  let words = clean.split(" ");
  
  // =========================
  // كلمة واحدة
  // =========================
  if (words.length === 1) {
    let word = words[0];
    
    if (word.length <= 13) return word;
    
    // إذا كلمة وحدة طويلة → نقسمها
    let mid = Math.floor(word.length / 2);
    
    return `
      ${word.slice(0, mid)}<br>
      <span style="font-size:14px;opacity:0.8">
        ${word.slice(mid)}
      </span>
    `;
  }
  
  // =========================
  // أكثر من كلمة
  // =========================
  let first = words[0];
  
  // 🔥 أول سطر max 13 حرف
  if (first.length > 13) {
    let mid = Math.floor(first.length / 2);
    
    return `
      ${first.slice(0, mid)}<br>
      <span style="font-size:14px;opacity:0.8">
        ${first.slice(mid)} ${words.slice(1).join(" ")}
      </span>
    `;
  }
  
  let rest = words.slice(1).join(" ");
  
  return `
    ${first}<br>
    <span style="font-size:14px;opacity:0.8">${rest}</span>
  `;
}
